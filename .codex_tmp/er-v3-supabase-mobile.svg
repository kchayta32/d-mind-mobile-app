  <g class="note">
    <rect x="96" y="1180" width="1540" height="76" rx="8"/>
    <text class="note-title" x="114" y="1204">Scope</text>
    <text class="note-line" x="114" y="1224">Only remote tables/views touched by Android-facing code are shown here; the broader web app schema has additional tables.</text>
<text class="note-line" x="114" y="1246">Dashed arrows are logical reads/writes from code where the database has no declared FK.</text>
  </g>
