<text class="field" x="18" y="112">[FK] incident_id: UUID?</text>
<text class="field" x="18" y="136">image_url: TEXT</text>
<text class="field" x="18" y="160">assessment_result: JSONB</text>
<text class="field" x="18" y="184">damage_level: TEXT</text>
<text class="field" x="18" y="208">confidence_score: DECIMAL</text>
<text class="field" x="18" y="232">processing_status: TEXT</text>
<text class="field" x="18" y="256">processed_at, created_at</text>
  </g>

  <g class="entity remote" transform="translate(1240,164)">
