<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .page-title { font: 700 38px Arial, Helvetica, sans-serif; fill: #111827; }
      .page-subtitle { font: 18px Arial, Helvetica, sans-serif; fill: #536171; }
      .group rect { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 1.4; }
      .group-label { font: 700 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .entity-bg { fill: #ffffff; stroke-width: 2.4; }
      .entity-head { stroke-width: 0; }
      .head-cut { stroke: rgba(17,24,39,.18); stroke-width: 1.2; }
      .entity-title { font: 700 19px Arial, Helvetica, sans-serif; fill: #111827; }
      .entity-subtitle { font: 13px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .field { font: 15px Consolas, "Courier New", monospace; fill: #1f2937; }
      .core .entity-bg { stroke: #2563eb; }
      .core .entity-head { fill: #dbeafe; }
      .active .entity-bg { stroke: #059669; }
      .active .entity-head { fill: #d1fae5; }
      .remote .entity-bg { stroke: #7c3aed; }
      .remote .entity-head { fill: #ede9fe; }
      .event .entity-bg { stroke: #ea580c; }
      .event .entity-head { fill: #ffedd5; }
      .support .entity-bg { stroke: #0f766e; }
      .support .entity-head { fill: #ccfbf1; }
      .external .entity-bg { stroke: #64748b; }
      .external .entity-head { fill: #e2e8f0; }
      .relation { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .relation.solid { stroke: #334155; }
      .relation.logic { stroke: #0f766e; marker-end: url(#arrow-teal); }
      .relation.remote { stroke: #7c3aed; marker-end: url(#arrow-purple); }
      .relation.event { stroke: #ea580c; marker-end: url(#arrow-orange); }
      .relation.dashed { stroke-dasharray: 8 8; }
      .rel-label { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; paint-order: stroke; stroke: #f7f9fc; stroke-width: 5px; stroke-linejoin: round; }
      .note rect { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.8; }
      .note-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #9a3412; }
      .note-line { font: 14px Arial, Helvetica, sans-serif; fill: #7c2d12; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-teal" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect class="bg" width="1700" height="1120"/>
  <text class="page-title" x="850" y="54" text-anchor="middle">V4 - Incident, Damage Assessment, and Public Reporting ERD</text>
  <text class="page-subtitle" x="850" y="84" text-anchor="middle">Focused ER slice for reports submitted from Android screens and AI damage assessment.</text>
  
  <g class="group">
    <rect x="60" y="118" width="1580" height="786" rx="14"/>
    <text class="group-label" x="78" y="148">Reporting and assessment workflow</text>
  </g>
  
  <g>
    <path class="relation remote " d="M490 360 L645 360"/>
    <text class="rel-label" x="566" y="342" text-anchor="middle">1:N damage_assessments.incident_id</text>
  </g>

  <g>
    <path class="relation logic dashed" d="M490 285 L1180 285"/>
    <text class="rel-label" x="840" y="268" text-anchor="middle">image_urls[]</text>
  </g>

  <g>
    <path class="relation logic dashed" d="M1035 350 L1180 350"/>
    <text class="rel-label" x="1108" y="333" text-anchor="middle">image_url</text>
  </g>

  <g>
    <path class="relation remote dashed" d="M300 550 L300 660"/>
    <text class="rel-label" x="352" y="612" text-anchor="middle">public view</text>
  </g>

  <g>
    <path class="relation solid dashed" d="M950 550 L780 660"/>
    <text class="rel-label" x="870" y="620" text-anchor="middle">separate report type</text>
  </g>

  <g>
    <path class="relation solid dashed" d="M950 550 L1220 660"/>
    <text class="rel-label" x="1100" y="615" text-anchor="middle">UX feedback</text>
  </g>
  
  <g class="entity remote" transform="translate(110,200)">
    <rect class="entity-bg" width="380" height="350" rx="8"/>
    <rect class="entity-head" width="380" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H380"/>
    <text class="entity-title" x="190" y="26" text-anchor="middle">incident_reports</text>
    <text class="entity-subtitle" x="190" y="48" text-anchor="middle">primary incident entity</text>
    <text class="field" x="18" y="88">[PK] id: UUID</text>
<text class="field" x="18" y="112">type: TEXT</text>
<text class="field" x="18" y="136">title: TEXT</text>
<text class="field" x="18" y="160">description: TEXT</text>
<text class="field" x="18" y="184">location: TEXT?</text>
<text class="field" x="18" y="208">coordinates: JSONB?</text>
<text class="field" x="18" y="232">severity_level: INTEGER</text>
<text class="field" x="18" y="256">contact_info: TEXT?</text>
<text class="field" x="18" y="280">image_urls: TEXT[]</text>
<text class="field" x="18" y="304">status: TEXT</text>
<text class="field" x="18" y="328">is_verified: BOOLEAN</text>
<text class="field" x="18" y="352">created_at, updated_at</text>
  </g>

  <g class="entity event" transform="translate(645,200)">
    <rect class="entity-bg" width="390" height="350" rx="8"/>
    <rect class="entity-head" width="390" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H390"/>
    <text class="entity-title" x="195" y="26" text-anchor="middle">damage_assessments</text>
    <text class="entity-subtitle" x="195" y="48" text-anchor="middle">image analysis result</text>
    <text class="field" x="18" y="88">[PK] id: UUID</text>
<text class="field" x="18" y="112">[FK] incident_id: UUID?</text>
<text class="field" x="18" y="136">image_url: TEXT</text>
<text class="field" x="18" y="160">original_filename: TEXT?</text>
<text class="field" x="18" y="184">assessment_result: JSONB</text>
<text class="field" x="18" y="208">damage_level: TEXT</text>
<text class="field" x="18" y="232">confidence_score: DECIMAL</text>
<text class="field" x="18" y="256">detected_categories: TEXT[]</text>
<text class="field" x="18" y="280">estimated_cost: DECIMAL</text>
<text class="field" x="18" y="304">processing_status: TEXT</text>
<text class="field" x="18" y="328">error_message, processed_at</text>
  </g>

  <g class="entity support" transform="translate(1180,200)">
    <rect class="entity-bg" width="360" height="260" rx="8"/>
    <rect class="entity-head" width="360" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H360"/>
    <text class="entity-title" x="180" y="26" text-anchor="middle">storage.objects</text>
    <text class="entity-subtitle" x="180" y="48" text-anchor="middle">public image URLs</text>
    <text class="field" x="18" y="88">[PK] id: UUID/object id</text>
<text class="field" x="18" y="112">bucket_id</text>
<text class="field" x="18" y="136">name/path</text>
<text class="field" x="18" y="160">incident-images</text>
<text class="field" x="18" y="184">damage-assessment-images</text>
<text class="field" x="18" y="208">public URL stored in tables</text>
  </g>

  <g class="entity remote" transform="translate(170,660)">
    <rect class="entity-bg" width="330" height="220" rx="8"/>
    <rect class="entity-head" width="330" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H330"/>
    <text class="entity-title" x="165" y="26" text-anchor="middle">incident_reports_public</text>
    <text class="entity-subtitle" x="165" y="48" text-anchor="middle">safe read view</text>
    <text class="field" x="18" y="88">id, type, title</text>
<text class="field" x="18" y="112">description, location</text>
<text class="field" x="18" y="136">severity_level</text>
<text class="field" x="18" y="160">status, is_verified</text>
<text class="field" x="18" y="184">created_at</text>
<text class="field" x="18" y="208">no contact_info</text>
  </g>

  <g class="entity remote" transform="translate(620,660)">
    <rect class="entity-bg" width="330" height="230" rx="8"/>
    <rect class="entity-head" width="330" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H330"/>
    <text class="entity-title" x="165" y="26" text-anchor="middle">victim_reports</text>
    <text class="entity-subtitle" x="165" y="48" text-anchor="middle">emergency victim info</text>
    <text class="field" x="18" y="88">[PK] id: UUID</text>
<text class="field" x="18" y="112">name: TEXT</text>
<text class="field" x="18" y="136">contact: TEXT?</text>
<text class="field" x="18" y="160">description: TEXT?</text>
<text class="field" x="18" y="184">coordinates: JSON</text>
<text class="field" x="18" y="208">status: TEXT</text>
<text class="field" x="18" y="232">created_at, updated_at</text>
  </g>

  <g class="entity support" transform="translate(1070,660)">
    <rect class="entity-bg" width="330" height="230" rx="8"/>
    <rect class="entity-head" width="330" height="58" rx="8"/>
    <path class="head-cut" d="M0 58 H330"/>
    <text class="entity-title" x="165" y="26" text-anchor="middle">satisfaction_surveys</text>
    <text class="entity-subtitle" x="165" y="48" text-anchor="middle">post-use feedback</text>
    <text class="field" x="18" y="88">[PK] id: UUID</text>
<text class="field" x="18" y="112">overall_rating</text>
<text class="field" x="18" y="136">UI/map/alert ratings</text>
<text class="field" x="18" y="160">emergency_info_rating</text>
<text class="field" x="18" y="184">ai_assistant_rating</text>
<text class="field" x="18" y="208">suggestions</text>
<text class="field" x="18" y="232">created_at, updated_at</text>
  </g>
  
  <g class="note">
    <rect x="116" y="956" width="1450" height="84" rx="8"/>
    <text class="note-title" x="134" y="980">Android repository behavior</text>
    <text class="note-line" x="134" y="1000">submitIncidentReport writes incident_reports directly unless BackendRestClient is configured, in which case the backend writes it.</text>
<text class="note-line" x="134" y="1022">invokeDamageAssessment creates a pending damage_assessments row, then calls the analyze-damage Edge Function with the assessment id and image URL.</text>
  </g>
</svg>