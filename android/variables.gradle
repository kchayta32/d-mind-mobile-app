// กำหนดตัวแปรและเวอร์ชันของไลบรารีต่างๆ ที่ใช้ร่วมกันในโปรเจกต์
ext {
    // กำหนดค่า SDK สำหรับ Android
    minSdkVersion = 23
    compileSdkVersion = 35
    targetSdkVersion = 35

    // เวอร์ชันของไลบรารี AndroidX Core และ UI
    androidxActivityVersion = '1.9.2'
    androidxAppCompatVersion = '1.7.0'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.15.0'
    androidxCoreKtxVersion = '1.15.0'
    androidxFragmentVersion = '1.8.4'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.12.1'

    // เวอร์ชันสำหรับ Unit Test และ UI Test
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.2.1'
    androidxEspressoCoreVersion = '3.6.1'

    // เวอร์ชันสำหรับ Firebase และบริการระบุตำแหน่งของ Google
    firebaseMessagingVersion = '24.1.0'
    playServicesLocationVersion = '21.3.0'

    // เวอร์ชันสำหรับ WorkManager และ Lifecycle
    androidxWorkVersion = '2.9.1'
    lifecycleVersion = '2.8.7'

    // เวอร์ชันสำหรับการจัดเก็บข้อมูล (DataStore & Room Database)
    dataStoreVersion = '1.1.1'
    roomVersion = '2.8.4'

    // เวอร์ชันสำหรับแผนที่และเครือข่าย/บริการยืนยันตัวตน
    mapLibreVersion = '11.8.0'
    ktorVersion = '3.4.3'
    googleAuthVersion = '1.47.0'
}
